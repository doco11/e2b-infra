version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: e2b-lite-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      PGDATA: /var/lib/postgresql/data
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: e2b-lite-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Optional: Uncomment for analytics/observability
  # clickhouse:
  #   image: clickhouse/clickhouse-server:25.4.5.24
  #   container_name: e2b-lite-clickhouse
  #   environment:
  #     CLICKHOUSE_DB: clickhouse
  #     CLICKHOUSE_USER: clickhouse
  #     CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: '1'
  #     CLICKHOUSE_PASSWORD: clickhouse
  #   ports:
  #     - "8123:8123"
  #     - "9000:9000"
  #   volumes:
  #     - clickhouse-data:/var/lib/clickhouse

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  # clickhouse-data:
  #   driver: local

networks:
  default:
    name: e2b-lite-network
